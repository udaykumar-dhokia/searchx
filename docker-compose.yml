services:
  db:
    image: pgvector/pgvector:pg17
    container_name: trawl_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trawl_db
    ports:
      - "6000:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trawl_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trawl_net

  redis:
    image: redis:7-alpine
    container_name: trawl_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trawl_net

  searxng:
    image: searxng/searxng:latest
    container_name: trawl_searxng
    restart: always
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trawl_net

  backend:
    build: .
    container_name: trawl_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trawl_db
      - SEARXNG_BASE_URL=http://searxng:8080
      - API_BASE=http://localhost:8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - trawl_config:/root/.trawl
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - trawl_net

  ollama:
    image: ollama/ollama:latest
    container_name: trawl_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - trawl_net

networks:
  trawl_net:
    driver: bridge

volumes:
  db_data:
  trawl_config:
  ollama_data:
